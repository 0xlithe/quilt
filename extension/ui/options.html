<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>quilt Options</title>
    <link rel="stylesheet" href="popup-bundle.css" />
    <script type="module" src="popup-bundle.js"></script>
    <style>
      :root {
        --md-sys-color-primary: #e7e9ea;
        --md-sys-color-on-primary: #0a0a0c;
        --md-sys-color-surface: #0a0a0c;
        --md-sys-color-on-surface: #e7e9ea;
        --md-sys-color-on-surface-variant: #8b9198;
        --md-sys-color-outline: #2f3336;
        --md-ref-typeface-plain: 'Manrope', system-ui, sans-serif;
        --md-ref-typeface-brand: 'Manrope', system-ui, sans-serif;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Manrope', system-ui, sans-serif;
        min-width: 260px;
        max-width: 300px;
        color: #e7e9ea;
        background: #0a0a0c;
        padding: 20px;
      }

      h2 {
        font-size: 14px;
        font-weight: 600;
        color: #e7e9ea;
        margin-bottom: 16px;
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .check-row label {
        font-size: 12px;
        color: #8b9198;
        cursor: pointer;
        user-select: none;
      }

      md-checkbox {
        --md-checkbox-outline-color: #2f3336;
        --md-checkbox-hover-outline-color: #4a4e54;
        --md-checkbox-selected-container-color: #e7e9ea;
        --md-checkbox-selected-icon-color: #0a0a0c;
        --md-focus-ring-color: transparent;
        --md-checkbox-state-layer-size: 0px;
      }

      .license-section {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #2f3336;
      }

      .license-section h3 {
        font-size: 12px;
        font-weight: 600;
        color: #8b9198;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 12px;
      }

      .license-status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        font-size: 12px;
      }

      .license-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .license-dot.free { background: #71767b; }
      .license-dot.premium { background: #22c55e; }

      .license-tier {
        color: #e7e9ea;
        font-weight: 600;
      }

      .license-detail {
        color: #71767b;
        font-size: 11px;
      }

      .license-input-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        margin-bottom: 10px;
      }

      .license-input-row input {
        flex: 1;
        background: #141416;
        border: 1px solid #2f3336;
        border-radius: 8px;
        color: #e7e9ea;
        font-family: 'Manrope', monospace;
        font-size: 12px;
        padding: 8px 10px;
        outline: none;
        transition: border-color 0.15s;
      }

      .license-input-row input:focus {
        border-color: #4a4e54;
      }

      .license-input-row input::placeholder {
        color: #4a4e54;
      }

      .license-btn {
        background: #e7e9ea;
        color: #0a0a0c;
        border: none;
        border-radius: 8px;
        font-family: 'Manrope', system-ui, sans-serif;
        font-size: 12px;
        font-weight: 600;
        padding: 8px 14px;
        cursor: pointer;
        transition: opacity 0.15s;
        white-space: nowrap;
      }

      .license-btn:hover { opacity: 0.85; }

      .license-btn.deactivate {
        background: none;
        color: #f4212e;
        border: 1px solid #2f3336;
      }

      .license-btn.deactivate:hover {
        background: #3a1a1a;
      }

      .license-msg {
        font-size: 11px;
        color: #71767b;
        margin-top: 4px;
        min-height: 1em;
      }

      .license-msg.error { color: #f4212e; }
      .license-msg.success { color: #22c55e; }

      .upgrade-links {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .upgrade-link {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 8px 10px;
        border-radius: 8px;
        font-family: 'Manrope', system-ui, sans-serif;
        font-size: 11px;
        font-weight: 600;
        text-decoration: none;
        transition: opacity 0.15s;
      }

      .upgrade-link:hover { opacity: 0.85; }

      .upgrade-link.monthly {
        background: #e7e9ea;
        color: #0a0a0c;
      }

      .upgrade-link.lifetime {
        background: none;
        border: 1px solid #2f3336;
        color: #e7e9ea;
      }

      .upgrade-tag {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <h2>quilt settings</h2>
    <div class="check-row">
      <md-checkbox id="sidebar" touch-target="wrapper" checked></md-checkbox>
      <label for="sidebar">Open sidebar on icon click</label>
    </div>
    <div class="check-row" style="margin-top: 12px;">
      <md-checkbox id="debug" touch-target="wrapper"></md-checkbox>
      <label for="debug">Enable debug logging</label>
    </div>
    <div class="license-section">
      <h3>License</h3>
      <div class="license-status">
        <span id="licenseDot" class="license-dot free"></span>
        <span id="licenseTier" class="license-tier">Free</span>
        <span id="licenseDetail" class="license-detail"></span>
      </div>
      <div id="licenseActivateRow" class="license-input-row">
        <input id="licenseKeyInput" type="text" placeholder="Enter activation code" spellcheck="false" autocomplete="off" />
        <button id="btnActivate" class="license-btn">Activate</button>
      </div>
      <div id="licenseDeactivateRow" class="license-input-row" style="display:none">
        <button id="btnDeactivate" class="license-btn deactivate">Deactivate</button>
      </div>
      <div id="licenseMsg" class="license-msg"></div>
      <div id="upgradeLinks" class="upgrade-links">
        <a id="linkMonthly" class="upgrade-link monthly" href="#" target="_blank">Pro <span class="upgrade-tag">monthly</span></a>
        <a id="linkLifetime" class="upgrade-link lifetime" href="#" target="_blank">Pro <span class="upgrade-tag">lifetime</span></a>
      </div>
    </div>

    <script src="../messaging/messaging.js"></script>
    <script src="../storage/storage.js"></script>
    <script src="../core/tierLimits.js"></script>
    <script src="../core/license.js"></script>
    <script src="options.js"></script>
  </body>
</html>
