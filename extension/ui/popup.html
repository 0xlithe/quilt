<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>quilt</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="popup-bundle.css" />
    <script type="module" src="popup-bundle.js"></script>
    <style>
      body {
        min-width: 300px;
        max-width: 320px;
      }

      #status {
        margin-top: 14px;
        font-size: 12px;
        line-height: 1.5;
        color: #71767b;
        min-height: 1.5em;
        transition: opacity 200ms ease;
        animation: stagger 250ms ease-out 200ms both;
      }

      #status strong {
        color: #e7e9ea;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <img class="brand-mark" src="../assets/icon-48.png" alt="quilt icon" />
      <h1>quilt<span class="sep">&bull;</span><span class="sub">for</span>
        <svg class="x-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </h1>
    </div>

    <div class="field">
      <md-outlined-select id="taskType" label="Task mode">
        <md-select-option value="follow" selected>
          <div slot="headline">Follow</div>
        </md-select-option>
        <md-select-option value="unfollow">
          <div slot="headline">Unfollow</div>
        </md-select-option>
        <md-select-option value="like">
          <div slot="headline">Like</div>
        </md-select-option>
        <md-select-option value="unlike">
          <div slot="headline">Unlike</div>
        </md-select-option>
      </md-outlined-select>
    </div>

    <div class="field">
      <md-outlined-text-field id="maxPostAmount" label="Max actions" type="number" min="1" value="50"></md-outlined-text-field>
    </div>

    <div class="field-row">
      <div class="field">
        <md-outlined-text-field id="delayMin" label="Delay min (ms)" type="number" min="0" value="4000"></md-outlined-text-field>
      </div>
      <div class="field">
        <md-outlined-text-field id="delayMax" label="Delay max (ms)" type="number" min="0" value="8000"></md-outlined-text-field>
      </div>
    </div>

    <div class="quilt-advanced-hidden" aria-hidden="true">
      <md-outlined-text-field id="longPauseEvery" label="Long pause every N (0=off)" type="number" min="0" value="0"></md-outlined-text-field>
      <md-outlined-text-field id="longPauseMin" label="Long pause min (ms)" type="number" min="0" value="15000"></md-outlined-text-field>
      <md-outlined-text-field id="longPauseMax" label="Long pause max (ms)" type="number" min="0" value="45000"></md-outlined-text-field>
    </div>

    <div class="actions">
      <div class="row">
        <md-filled-button id="btnStart">Start</md-filled-button>
        <md-outlined-button id="btnStop" class="btn-stop">Stop</md-outlined-button>
      </div>
    </div>

    <div id="status"></div>

    <script src="../messaging/messaging.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
