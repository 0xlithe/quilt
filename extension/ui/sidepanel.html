<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>quilt</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <link rel="stylesheet" href="sidepanel-bundle.css" />
    <script type="module" src="sidepanel-bundle.js"></script>
    <style>
      :root {
        --md-sys-color-primary: #e7e9ea;
        --md-sys-color-on-primary: #0a0a0c;
        --md-sys-color-primary-container: #2a2a2e;
        --md-sys-color-on-primary-container: #e7e9ea;
        --md-sys-color-secondary: #8b9198;
        --md-sys-color-on-secondary: #0a0a0c;
        --md-sys-color-surface: #0a0a0c;
        --md-sys-color-surface-container: #141416;
        --md-sys-color-surface-container-low: #101012;
        --md-sys-color-surface-container-high: #1c1c1e;
        --md-sys-color-surface-container-highest: #242426;
        --md-sys-color-on-surface: #e7e9ea;
        --md-sys-color-on-surface-variant: #8b9198;
        --md-sys-color-outline: #2f3336;
        --md-sys-color-outline-variant: #1e1e20;
        --md-sys-color-error: #f4212e;
        --md-sys-color-on-error: #fff;
        --md-ref-typeface-plain: 'Manrope', system-ui, sans-serif;
        --md-ref-typeface-brand: 'Manrope', system-ui, sans-serif;
        --md-sys-shape-corner-small: 10px;
        --md-sys-shape-corner-medium: 10px;
        --md-sys-shape-corner-large: 10px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Manrope', system-ui, sans-serif;
        color: #e7e9ea;
        background: #0a0a0c;
        padding: 20px;
        min-height: 100vh;
        animation: fadeIn 280ms ease-out both;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes stagger {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid #1e1e20;
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      }

      .brand h1 {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: #e7e9ea;
      }

      .brand h1 .sep {
        opacity: 0.3;
        font-size: 0.55em;
        margin: 0 4px;
        vertical-align: 1px;
      }

      .brand h1 .sub {
        font-size: 0.55em;
        font-weight: 400;
        opacity: 0.5;
      }

      .brand h1 .x-logo {
        width: 10px;
        height: 10px;
        vertical-align: 0px;
        margin-left: 1px;
        opacity: 0.5;
      }

      /* ── Controls ── */

      .field {
        margin-bottom: 14px;
        animation: stagger 250ms ease-out both;
      }

      .field:nth-child(1) { animation-delay: 40ms; }
      .field:nth-child(2) { animation-delay: 70ms; }
      .field:nth-child(3) { animation-delay: 100ms; }
      .field:nth-child(4) { animation-delay: 130ms; }

      .field-row {
        display: flex;
        gap: 10px;
      }

      .field-row .field {
        flex: 1;
        margin-bottom: 0;
      }

      md-outlined-text-field,
      md-outlined-select {
        width: 100%;
        --md-outlined-text-field-container-shape: 10px;
        --md-outlined-text-field-outline-color: #2f3336;
        --md-outlined-text-field-hover-outline-color: #4a4e54;
        --md-outlined-text-field-focus-outline-color: #e7e9ea;
        --md-outlined-text-field-input-text-color: #e7e9ea;
        --md-outlined-text-field-label-text-color: #71767b;
        --md-outlined-text-field-hover-label-text-color: #8b9198;
        --md-outlined-text-field-focus-label-text-color: #e7e9ea;
        --md-outlined-text-field-input-text-font: 'Manrope', system-ui, sans-serif;
        --md-outlined-text-field-label-text-font: 'Manrope', system-ui, sans-serif;
        --md-outlined-text-field-input-text-size: 13px;
        --md-outlined-text-field-label-text-size: 12px;
        --md-outlined-text-field-top-space: 8px;
        --md-outlined-text-field-bottom-space: 8px;
        --md-outlined-select-text-field-container-shape: 10px;
        --md-outlined-select-text-field-outline-color: #2f3336;
        --md-outlined-select-text-field-hover-outline-color: #4a4e54;
        --md-outlined-select-text-field-focus-outline-color: #e7e9ea;
        --md-outlined-select-text-field-input-text-color: #e7e9ea;
        --md-outlined-select-text-field-label-text-color: #71767b;
        --md-outlined-select-text-field-input-text-font: 'Manrope', system-ui, sans-serif;
        --md-outlined-select-text-field-label-text-font: 'Manrope', system-ui, sans-serif;
        --md-outlined-select-text-field-input-text-size: 13px;
        --md-outlined-select-text-field-label-text-size: 12px;
      }

      md-outlined-select::part(menu) {
        --md-menu-container-color: #1c1c1e;
        --md-menu-container-shape: 10px;
      }

      md-select-option {
        --md-menu-item-container-color: #1c1c1e;
        --md-menu-item-selected-container-color: #2a2a2e;
        --md-menu-item-label-text-color: #e7e9ea;
        --md-menu-item-selected-label-text-color: #e7e9ea;
        --md-menu-item-hover-state-layer-color: #ffffff;
        --md-menu-item-hover-state-layer-opacity: 0.08;
        --md-menu-item-label-text-font: 'Manrope', system-ui, sans-serif;
        --md-menu-item-label-text-size: 13px;
        --md-focus-ring-color: transparent;
      }

      md-select-option[selected] {
        color: #e7e9ea;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 18px;
        animation: stagger 250ms ease-out 160ms both;
      }

      .actions .row {
        display: flex;
        gap: 8px;
      }

      md-filled-button,
      md-outlined-button {
        flex: 1;
        --md-filled-button-container-shape: 10px;
        --md-filled-button-container-color: #e7e9ea;
        --md-filled-button-label-text-color: #0a0a0c;
        --md-filled-button-hover-label-text-color: #0a0a0c;
        --md-filled-button-label-text-font: 'Manrope', system-ui, sans-serif;
        --md-filled-button-label-text-weight: 600;
        --md-filled-button-label-text-size: 13px;
        --md-filled-button-container-height: 38px;
        --md-outlined-button-container-shape: 10px;
        --md-outlined-button-outline-color: #2f3336;
        --md-outlined-button-hover-outline-color: #4a4e54;
        --md-outlined-button-label-text-color: #e7e9ea;
        --md-outlined-button-hover-label-text-color: #fff;
        --md-outlined-button-label-text-font: 'Manrope', system-ui, sans-serif;
        --md-outlined-button-label-text-weight: 500;
        --md-outlined-button-label-text-size: 12px;
        --md-outlined-button-container-height: 36px;
      }

      .btn-stop {
        --md-outlined-button-label-text-color: #f4212e;
        --md-outlined-button-hover-label-text-color: #ff4444;
        --md-outlined-button-outline-color: #3a1a1a;
        --md-outlined-button-hover-outline-color: #5a2020;
      }

      /* ── Timer / Progress panel ── */

      .timer-panel {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #1e1e20;
        animation: stagger 250ms ease-out 200ms both;
      }

      .timer-panel.hidden {
        display: none;
      }

      .timer-row {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 14px;
      }

      .timer-elapsed {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
        color: #e7e9ea;
      }

      .timer-label {
        font-size: 12px;
        color: #71767b;
        font-weight: 400;
      }

      .progress-track {
        width: 100%;
        height: 6px;
        background: #1e1e20;
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .progress-fill {
        height: 100%;
        background: #e7e9ea;
        border-radius: 3px;
        width: 0%;
        transition: width 0.4s ease-out;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: #8b9198;
        margin-bottom: 6px;
      }

      .progress-label .count {
        font-weight: 600;
        color: #e7e9ea;
        font-variant-numeric: tabular-nums;
      }

      /* ── Status ── */

      .status-section {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid #1e1e20;
        animation: stagger 250ms ease-out 240ms both;
      }

      .status-text {
        font-size: 12px;
        line-height: 1.6;
        color: #71767b;
        min-height: 1.6em;
        transition: opacity 200ms ease;
      }

      .status-text strong {
        color: #e7e9ea;
        font-weight: 500;
      }

      /* ── Idle state ── */

      .idle-state {
        text-align: center;
        padding: 32px 16px;
        animation: stagger 250ms ease-out 200ms both;
      }

      .idle-state.hidden {
        display: none;
      }

      .idle-icon {
        width: 40px;
        height: 40px;
        margin: 0 auto 14px;
        opacity: 0.2;
      }

      .idle-text {
        font-size: 13px;
        color: #71767b;
        line-height: 1.5;
      }

      .quilt-advanced-hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <img class="brand-mark" src="../assets/icon-48.png" alt="quilt icon" />
      <h1>quilt<span class="sep">&bull;</span><span class="sub">for</span>
        <svg class="x-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </h1>
    </div>

    <div class="field">
      <md-outlined-select id="taskType" label="Task mode">
        <md-select-option value="follow" selected>
          <div slot="headline">Follow</div>
        </md-select-option>
        <md-select-option value="unfollow">
          <div slot="headline">Unfollow</div>
        </md-select-option>
        <md-select-option value="like">
          <div slot="headline">Like</div>
        </md-select-option>
        <md-select-option value="unlike">
          <div slot="headline">Unlike</div>
        </md-select-option>
      </md-outlined-select>
    </div>

    <div class="field">
      <md-outlined-text-field id="maxPostAmount" label="Max actions" type="number" min="1" value="50"></md-outlined-text-field>
    </div>

    <div class="field-row">
      <div class="field">
        <md-outlined-text-field id="delayMin" label="Delay min (ms)" type="number" min="0" value="4000"></md-outlined-text-field>
      </div>
      <div class="field">
        <md-outlined-text-field id="delayMax" label="Delay max (ms)" type="number" min="0" value="8000"></md-outlined-text-field>
      </div>
    </div>

    <div class="quilt-advanced-hidden" aria-hidden="true">
      <md-outlined-text-field id="longPauseEvery" label="Long pause every N (0=off)" type="number" min="0" value="0"></md-outlined-text-field>
      <md-outlined-text-field id="longPauseMin" label="Long pause min (ms)" type="number" min="0" value="15000"></md-outlined-text-field>
      <md-outlined-text-field id="longPauseMax" label="Long pause max (ms)" type="number" min="0" value="45000"></md-outlined-text-field>
    </div>

    <div class="actions">
      <div class="row">
        <md-filled-button id="btnStart">Start</md-filled-button>
        <md-outlined-button id="btnStop" class="btn-stop">Stop</md-outlined-button>
      </div>
    </div>

    <!-- Timer / Progress — visible when a task is active -->
    <div id="timerPanel" class="timer-panel hidden">
      <div class="timer-row">
        <span id="elapsed" class="timer-elapsed">00:00</span>
        <span class="timer-label">elapsed</span>
      </div>
      <div class="progress-label">
        <span id="progressVerb">Following</span>
        <span id="progressCount" class="count">0 / 0</span>
      </div>
      <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <!-- Idle state — visible when no task is running -->
    <div id="idleState" class="idle-state">
      <svg class="idle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <div class="idle-text">Ready to start a task</div>
    </div>

    <div class="status-section">
      <div id="status" class="status-text"></div>
    </div>

    <script src="../messaging/messaging.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
